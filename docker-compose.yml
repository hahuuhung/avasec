version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: sysanti-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: sysanti_db
      MYSQL_USER: sysanti
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Server (API + Socket.IO)
  sysanti-server:
    build: ./SysAnti.Server
    container_name: sysanti-server
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: sysanti
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: sysanti_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./SysAnti.Server/uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 3s
      retries: 3

  # Web Interface (Admin Panel)
  sysanti-web:
    image: nginx:alpine
    container_name: sysanti-web
    ports:
      - "8080:80"
    volumes:
      - ./SysAnti.Web/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sysanti-server
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  default:
    name: sysanti-network
