<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA Security — Mua &amp; Kích hoạt / Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
<div class="login-container fade-in" style="max-width: 720px;">
    <div class="glass-panel" style="padding: 28px;">
        <div class="text-center mb-4">
            <h1 style="color:#fff;font-weight:700;">🛡️ AVA Security Store</h1>
            <p style="color:#94A3B8;font-size:14px;">App offline · Key qua website · Tiết kiệm chi phí</p>
        </div>

        <div id="plans" class="row g-3 mb-4"></div>

        <hr style="border-color:rgba(255,255,255,0.1);">

        <h2 style="color:#E2E8F0;font-size:16px;margin-bottom:12px;">
            <i class="bi bi-key-fill"></i> Kích hoạt Key / Activate Key
        </h2>
        <p style="color:#94A3B8;font-size:13px;">Đăng nhập trước, sau đó nhập key nhận được sau thanh toán.</p>
        <div class="form-group mb-2">
            <input type="text" id="licenseKey" class="form-control" placeholder="AVA-XXXX-XXXX-XXXX-XXXX" style="background:rgba(0,0,0,0.3);color:#fff;border:1px solid rgba(255,255,255,0.1);">
        </div>
        <button id="activateBtn" class="btn-primary w-100 mb-3"><i class="bi bi-unlock"></i> Kích hoạt / Activate</button>

        <div class="d-flex gap-2 flex-wrap justify-content-center">
            <a href="/index.html" class="btn btn-outline-light btn-sm">Đăng nhập / Login</a>
            <a href="/dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
        </div>
    </div>
</div>
<script src="store.js"></script>
</body>
</html>
